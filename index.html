<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prestige Visual - Produtos Personalizados</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: #f5f5f5;
            color: #333;
            line-height: 1.6;
        }
        header {
            background: #111;
            color: #fff;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        header nav a {
            margin-left: 1rem;
            color: #fff;
            cursor: pointer;
            text-decoration: none;
        }
        header nav a:hover {
            color: #f0a500;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
        }
        .banner-simples {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            padding: 60px 20px;
            margin: 0;
        }
        .banner-simples h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        .grid-produtos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            padding: 2rem;
        }
        .produto-card {
            background: #fff;
            padding: 1rem;
            border-radius: 12px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            text-align: center;
            transition: transform 0.3s;
            cursor: pointer;
        }
        .produto-card:hover {
            transform: translateY(-5px);
        }
        .produto-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            background: #f0f0f0;
        }
        .produto-card h3 {
            margin: 1rem 0 0.5rem;
            font-size: 1.2rem;
        }
        .preco {
            font-weight: bold;
            color: #f05a28;
            font-size: 1.3rem;
            margin: 0.5rem 0;
        }
        .btn-personalizar {
            background: #0077cc;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            width: 100%;
            margin-top: 10px;
        }
        .btn-personalizar:hover {
            background: #005fa3;
        }
        .secao {
            display: none;
            padding: 2rem;
        }
        .secao.ativa {
            display: block;
        }
        .carrinho-item {
            background: white;
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .frete-area {
            background: #fef7e0;
            padding: 1rem;
            border-radius: 12px;
            margin: 1rem 0;
        }
        .frete-campos {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 15px 0;
        }
        .frete-campos input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }
        .total {
            background: #f8f9fa;
            padding: 1rem;
            border-radius: 12px;
            margin: 1rem 0;
            font-weight: bold;
            font-size: 1.2rem;
        }
        button {
            background: #0077cc;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
        }
        .btn-voltar {
            background: #6c757d;
            margin-bottom: 1rem;
        }
        .admin-produto {
            background: white;
            padding: 10px;
            margin: 5px 0;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-conteudo {
            background: white;
            padding: 2rem;
            border-radius: 16px;
            max-width: 500px;
            width: 90%;
            max-height: 90%;
            overflow: auto;
        }
        .modal-conteudo input, .modal-conteudo select, .modal-conteudo textarea {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
        }
        @media (max-width: 768px) {
            .grid-produtos {
                grid-template-columns: 1fr;
                padding: 1rem;
            }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">✨ PRESTIGE VISUAL</div>
    <nav>
        <a onclick="mostrarSecao('produtos')">🏠 Produtos</a>
        <a onclick="mostrarSecao('carrinho')">🛒 Carrinho (<span id="cart-count">0</span>)</a>
        <a onclick="mostrarSecao('admin')">🔧 Admin</a>
    </nav>
</header>

<div class="banner-simples">
    <h1>✨ Produtos Personalizados</h1>
    <p>Chaveiros, Troféus, Placas e muito mais com sua arte!</p>
</div>

<!-- Produtos -->
<div id="secao-produtos" class="secao ativa">
    <div class="grid-produtos" id="produtos-grid"></div>
</div>

<!-- Carrinho -->
<div id="secao-carrinho" class="secao">
    <button class="btn-voltar" onclick="mostrarSecao('produtos')">← Voltar</button>
    <h2>🛍️ Carrinho</h2>
    <div id="carrinho-lista"></div>
    
    <div class="frete-area">
        <h3>✈️ Calcular Frete</h3>
        <div class="frete-campos">
            <input type="text" id="cep" placeholder="CEP">
            <input type="number" id="peso" step="0.1" placeholder="Peso (kg)">
            <input type="number" id="altura" step="0.5" placeholder="Altura (cm)">
            <input type="number" id="largura" step="0.5" placeholder="Largura (cm)">
            <input type="number" id="comprimento" step="0.5" placeholder="Comprimento (cm)">
            <button onclick="calcularFrete()">Calcular</button>
        </div>
        <div id="frete-resultado"></div>
    </div>
    
    <div class="total" id="total-carrinho"></div>
    <button onclick="finalizarCompra()">✅ Finalizar Compra</button>
</div>

<!-- Admin -->
<div id="secao-admin" class="secao">
    <button class="btn-voltar" onclick="mostrarSecao('produtos')">← Voltar</button>
    <h2>🛠️ Administração</h2>
    
    <div style="background: white; padding: 1rem; border-radius: 12px; margin: 1rem 0;">
        <h3>➕ Adicionar Produto</h3>
        <input type="text" id="novo-nome" placeholder="Nome" style="width: 100%; margin: 5px 0; padding: 8px;">
        <input type="number" id="novo-preco" placeholder="Preço" style="width: 100%; margin: 5px 0; padding: 8px;">
        <input type="text" id="nova-imagem" placeholder="URL da imagem (deixe em branco para automática)" style="width: 100%; margin: 5px 0; padding: 8px;">
        <button onclick="adicionarProduto()" style="width: 100%; margin-top: 10px;">Adicionar Produto</button>
    </div>
    
    <h3>📦 Produtos</h3>
    <div id="admin-produtos"></div>
    
    <h3>📋 Pedidos</h3>
    <div id="admin-pedidos"></div>
</div>

<script>
    // DADOS
    let produtos = [
        { id: 1, nome: "Chaveiro Acrílico", preco: 12.90, imagem: "https://picsum.photos/id/1/200/200" },
        { id: 2, nome: "Chaveiro MDF", preco: 9.90, imagem: "https://picsum.photos/id/2/200/200" },
        { id: 3, nome: "Placa ACM", preco: 45.90, imagem: "https://picsum.photos/id/3/200/200" },
        { id: 4, nome: "Placa PVC 2mm", preco: 32.90, imagem: "https://picsum.photos/id/4/200/200" },
        { id: 5, nome: "Troféu Acrílico", preco: 55.90, imagem: "https://picsum.photos/id/5/200/200" },
        { id: 6, nome: "Troféu MDF", preco: 48.90, imagem: "https://picsum.photos/id/6/200/200" },
        { id: 7, nome: "Troféu Acrílico+MDF", preco: 69.90, imagem: "https://picsum.photos/id/7/200/200" }
    ];
    
    let carrinho = [];
    let freteValor = 0;
    
    // Subcategorias por tipo de produto
    const subcategorias = {
        "Chaveiro": ["Acrílico 3mm", "Acrílico 5mm", "Acrílico 10mm", "MDF 3mm", "MDF 5mm"],
        "Troféu": ["Acrílico Pequeno", "Acrílico Médio", "Acrílico Grande", "MDF", "Combo"],
        "Placa": ["ACM Branco", "ACM Fosco", "PVC 2mm", "PVC 3mm", "MDF"],
        "Padrão": ["Personalizado"]
    };
    
    function getCategoria(nome) {
        if (nome.includes("Chaveiro")) return "Chaveiro";
        if (nome.includes("Troféu")) return "Troféu";
        if (nome.includes("Placa")) return "Placa";
        return "Padrão";
    }
    
    // Salvar dados
    function salvarDados() {
        localStorage.setItem("prestige_produtos", JSON.stringify(produtos));
        localStorage.setItem("prestige_carrinho", JSON.stringify(carrinho));
    }
    
    function carregarDados() {
        const saved = localStorage.getItem("prestige_produtos");
        if (saved) produtos = JSON.parse(saved);
        const savedCart = localStorage.getItem("prestige_carrinho");
        if (savedCart) carrinho = JSON.parse(savedCart);
    }
    
    // Mostrar produtos
    function mostrarProdutos() {
        const grid = document.getElementById("produtos-grid");
        if (!grid) return;
        
        grid.innerHTML = produtos.map(prod => `
            <div class="produto-card" onclick="abrirPersonalizacao(${prod.id})">
                <img src="${prod.imagem}" alt="${prod.nome}" onerror="this.src='https://picsum.photos/id/1/200/200'">
                <h3>${prod.nome}</h3>
                <div class="preco">R$ ${prod.preco.toFixed(2)}</div>
                <button class="btn-personalizar" onclick="event.stopPropagation(); abrirPersonalizacao(${prod.id})">✨ Personalizar</button>
            </div>
        `).join("");
        
        atualizarContadorCarrinho();
    }
    
    // Modal de personalização
    function abrirPersonalizacao(id) {
        const produto = produtos.find(p => p.id === id);
        if (!produto) return;
        
        const categoria = getCategoria(produto.nome);
        const opcoes = subcategorias[categoria] || subcategorias["Padrão"];
        
        const modal = document.createElement("div");
        modal.className = "modal";
        modal.innerHTML = `
            <div class="modal-conteudo">
                <h3>${produto.nome}</h3>
                <img src="${produto.imagem}" style="width:100%; max-height:150px; object-fit:contain;">
                <p><strong>Preço: R$ ${produto.preco.toFixed(2)}</strong></p>
                
                <label>Variação:</label>
                <select id="selVariacao">
                    ${opcoes.map(op => `<option value="${op}">${op}</option>`).join("")}
                </select>
                
                <label>Descrição (cor, texto, medidas):</label>
                <textarea id="txtDescricao" rows="3" placeholder="Ex: Cor azul, gravação com nome..."></textarea>
                
                <label>Anexar arquivo (opcional):</label>
                <input type="file" id="fileAnexo" accept="image/*,application/pdf">
                
                <div style="margin-top: 15px;">
                    <button onclick="adicionarPersonalizado(${produto.id}, '${produto.nome}', ${produto.preco})">✅ Adicionar ao Carrinho</button>
                    <button onclick="fecharModal(this)">❌ Cancelar</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        
        window.personalizacaoTemp = { variacao: opcoes[0], descricao: "", anexo: "" };
        
        const selVariacao = modal.querySelector("#selVariacao");
        const txtDescricao = modal.querySelector("#txtDescricao");
        const fileAnexo = modal.querySelector("#fileAnexo");
        
        selVariacao.onchange = () => { window.personalizacaoTemp.variacao = selVariacao.value; };
        txtDescricao.onchange = () => { window.personalizacaoTemp.descricao = txtDescricao.value; };
        fileAnexo.onchange = (e) => {
            if (e.target.files[0]) {
                const reader = new FileReader();
                reader.onload = function(ev) {
                    window.personalizacaoTemp.anexo = ev.target.result;
                };
                reader.readAsDataURL(e.target.files[0]);
            }
        };
    }
    
    function adicionarPersonalizado(id, nome, preco) {
        const variacao = window.personalizacaoTemp?.variacao || "Padrão";
        const descricao = window.personalizacaoTemp?.descricao || "";
        const anexo = window.personalizacaoTemp?.anexo || "";
        
        const item = {
            id: Date.now(),
            produtoId: id,
            nome: `${nome} (${variacao})`,
            preco: preco,
            quantidade: 1,
            descricao: descricao,
            anexo: anexo
        };
        
        carrinho.push(item);
        salvarDados();
        mostrarCarrinho();
        atualizarContadorCarrinho();
        alert(`✅ ${item.nome} adicionado ao carrinho!`);
        fecharModal(document.querySelector(".modal button"));
        mostrarSecao("carrinho");
    }
    
    function fecharModal(botao) {
        const modal = botao.closest(".modal");
        if (modal) modal.remove();
    }
    
    // Mostrar carrinho
    function mostrarCarrinho() {
        const container = document.getElementById("carrinho-lista");
        if (!container) return;
        
        if (carrinho.length === 0) {
            container.innerHTML = "<p style='text-align:center; padding:2rem;'>Carrinho vazio</p>";
            atualizarTotal();
            return;
        }
        
        container.innerHTML = carrinho.map((item, idx) => `
            <div class="carrinho-item">
                <div>
                    <strong>${item.nome}</strong><br>
                    R$ ${item.preco.toFixed(2)} x ${item.quantidade} = R$ ${(item.preco * item.quantidade).toFixed(2)}
                    ${item.descricao ? `<div style="font-size:0.8rem; color:#666;">📝 ${item.descricao}</div>` : ""}
                    ${item.anexo ? `<div style="font-size:0.8rem;"><a href="${item.anexo}" download="anexo_${idx}">📎 Baixar anexo</a></div>` : ""}
                </div>
                <div>
                    <button onclick="alterarQuantidade(${idx}, -1)">-</button>
                    <span style="margin:0 10px;">${item.quantidade}</span>
                    <button onclick="alterarQuantidade(${idx}, 1)">+</button>
                    <button onclick="removerItem(${idx})" style="background:#d9534f;">🗑</button>
                </div>
            </div>
        `).join("");
        atualizarTotal();
    }
    
    function alterarQuantidade(idx, delta) {
        if (carrinho[idx].quantidade + delta > 0) {
            carrinho[idx].quantidade += delta;
        } else {
            carrinho.splice(idx, 1);
        }
        salvarDados();
        mostrarCarrinho();
        atualizarContadorCarrinho();
    }
    
    function removerItem(idx) {
        carrinho.splice(idx, 1);
        salvarDados();
        mostrarCarrinho();
        atualizarContadorCarrinho();
    }
    
    function atualizarTotal() {
        const subtotal = carrinho.reduce((s, i) => s + (i.preco * i.quantidade), 0);
        const total = subtotal + freteValor;
        const div = document.getElementById("total-carrinho");
        if (div) {
            div.innerHTML = `
                <div>Subtotal: R$ ${subtotal.toFixed(2)}</div>
                <div>Frete: R$ ${freteValor.toFixed(2)}</div>
                <div style="font-size:1.3rem; margin-top:10px;">Total: R$ ${total.toFixed(2)}</div>
            `;
        }
    }
    
    function atualizarContadorCarrinho() {
        const count = carrinho.reduce((s, i) => s + i.quantidade, 0);
        const span = document.getElementById("cart-count");
        if (span) span.innerText = count;
    }
    
    // Frete
    function calcularFrete() {
        const cep = document.getElementById("cep").value;
        const peso = parseFloat(document.getElementById("peso").value);
        const altura = parseFloat(document.getElementById("altura").value) || 10;
        const largura = parseFloat(document.getElementById("largura").value) || 20;
        const comprimento = parseFloat(document.getElementById("comprimento").value) || 30;
        
        if (!cep || isNaN(peso)) {
            alert("Preencha CEP e peso");
            return;
        }
        
        const volume = altura * largura * comprimento;
        const pesoCubico = volume / 6000;
        const pesoFinal = Math.max(peso, pesoCubico);
        
        const ultimoDigito = parseInt(cep.replace(/\D/g, '').slice(-1)) || 0;
        let fator = 1;
        if (ultimoDigito < 3) fator = 0.9;
        else if (ultimoDigito < 6) fator = 1.2;
        else fator = 1.5;
        
        freteValor = Math.max(9.9, 7 + (pesoFinal * 1.8) * fator);
        const prazo = Math.min(12, Math.max(2, Math.floor(2 + pesoFinal * 0.5 + fator)));
        
        document.getElementById("frete-resultado").innerHTML = `<span style="color:green;">✅ Frete: R$ ${freteValor.toFixed(2)} | Prazo: ${prazo} dias úteis</span>`;
        atualizarTotal();
    }
    
    // Finalizar compra
    function finalizarCompra() {
        if (carrinho.length === 0) {
            alert("Carrinho vazio!");
            return;
        }
        
        const subtotal = carrinho.reduce((s, i) => s + (i.preco * i.quantidade), 0);
        const pedido = {
            id: Date.now(),
            data: new Date().toLocaleString(),
            itens: JSON.parse(JSON.stringify(carrinho)),
            subtotal: subtotal,
            frete: freteValor,
            total: subtotal + freteValor
        };
        
        const pedidosSalvos = localStorage.getItem("prestige_pedidos");
        const pedidos = pedidosSalvos ? JSON.parse(pedidosSalvos) : [];
        pedidos.unshift(pedido);
        localStorage.setItem("prestige_pedidos", JSON.stringify(pedidos));
        
        carrinho = [];
        freteValor = 0;
        salvarDados();
        mostrarCarrinho();
        atualizarContadorCarrinho();
        document.getElementById("cep").value = "";
        document.getElementById("frete-resultado").innerHTML = "";
        alert("✅ Pedido finalizado com sucesso!");
        mostrarSecao("produtos");
        mostrarAdminPedidos();
    }
    
    // Admin
    function mostrarAdminProdutos() {
        const container = document.getElementById("admin-produtos");
        if (!container) return;
        container.innerHTML = produtos.map(prod => `
            <div class="admin-produto">
                <span><strong>${prod.nome}</strong> - R$ ${prod.preco.toFixed(2)}</span>
                <button onclick="excluirProduto(${prod.id})" style="background:#d9534f; padding:5px 10px;">Excluir</button>
            </div>
        `).join("");
    }
    
    function excluirProduto(id) {
        if (confirm("Remover este produto?")) {
            produtos = produtos.filter(p => p.id !== id);
            salvarDados();
            mostrarAdminProdutos();
            mostrarProdutos();
        }
    }
    
    function adicionarProduto() {
        const nome = document.getElementById("novo-nome").value.trim();
        const preco = parseFloat(document.getElementById("novo-preco").value);
        let imagem = document.getElementById("nova-imagem").value.trim();
        
        if (!nome || isNaN(preco)) {
            alert("Preencha nome e preço");
            return;
        }
        if (!imagem) imagem = "https://picsum.photos/id/" + (Math.floor(Math.random() * 100) + 1) + "/200/200";
        
        const novoId = Date.now();
        produtos.push({ id: novoId, nome, preco, imagem });
        salvarDados();
        mostrarAdminProdutos();
        mostrarProdutos();
        
        document.getElementById("novo-nome").value = "";
        document.getElementById("novo-preco").value = "";
        document.getElementById("nova-imagem").value = "";
        alert("Produto adicionado!");
    }
    
    function mostrarAdminPedidos() {
        const container = document.getElementById("admin-pedidos");
        if (!container) return;
        const pedidosSalvos = localStorage.getItem("prestige_pedidos");
        const pedidos = pedidosSalvos ? JSON.parse(pedidosSalvos) : [];
        
        if (pedidos.length === 0) {
            container.innerHTML = "<p>Nenhum pedido ainda.</p>";
            return;
        }
        
        container.innerHTML = pedidos.map(ped => `
            <div style="background:white; padding:1rem; margin:0.5rem 0; border-radius:8px;">
                <strong>Pedido #${ped.id}</strong> - ${ped.data}<br>
                Total: R$ ${ped.total.toFixed(2)} (Frete: R$ ${ped.frete.toFixed(2)})<br>
                Itens: ${ped.itens.map(i => `${i.nome} x${i.quantidade}`).join(", ")}
            </div>
        `).join("");
    }
    
    // Navegação
    function mostrarSecao(secao) {
        document.querySelectorAll(".secao").forEach(s => s.classList.remove("ativa"));
        document.getElementById(`secao-${secao}`).classList.add("ativa");
        
        if (secao === "carrinho") {
            mostrarCarrinho();
        }
        if (secao === "admin") {
            mostrarAdminProdutos();
            mostrarAdminPedidos();
        }
    }
    
    // Inicializar
    carregarDados();
    mostrarProdutos();
    mostrarCarrinho();
    atualizarContadorCarrinho();
    
    console.log("✅ Sistema inicializado com sucesso!", produtos.length, "produtos carregados");
</script>
</body>
</html>
